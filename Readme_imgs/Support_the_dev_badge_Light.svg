<style>
  .badge-container-light {
    display: inline-flex;
    align-items: stretch;
    background-color: #ffffff;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    box-shadow: 0 0 12px rgba(0, 112, 186, 0.4);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    white-space: nowrap; /* Impedisce al testo di andare a capo */
    height: 28px; /* Altezza fissa per aiutare il convertitore */
  }
  .badge-text-light {
    padding: 0 10px;
    color: #24292f;
    font-size: 12px;
    font-weight: 600;
    line-height: 26px; /* Centra il testo verticalmente */
  }
  .badge-icon-light {
    background-color: #0070BA; 
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { display: block; }
</style>


